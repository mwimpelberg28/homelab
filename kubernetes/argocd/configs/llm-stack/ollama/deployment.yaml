apiVersion: apps/v1
kind: Deployment
metadata:
  name: ollama
  namespace: llm-stack
  labels:
    app: ollama
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ollama
  template:
    metadata:
      labels:
        app: ollama
    spec:
      initContainers:
        - name: pull-model
          image: ollama/ollama:0.9.3
          command:
            - sh
            - -c
            - |
              ollama serve &
              OLLAMA_PID=$!
              sleep 5
              ollama pull qwen2.5-coder:3b
              kill $OLLAMA_PID
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: /models
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: "2Gi"
              cpu: "500m"

      containers:
        - name: ollama
          image: ollama/ollama:0.9.3
          ports:
            - containerPort: 11434
              name: http
          env:
            - name: OLLAMA_HOST
              value: "0.0.0.0"
            - name: OLLAMA_MODELS
              value: /models
            - name: OLLAMA_NUM_PARALLEL
              value: "2"
            - name: OLLAMA_CONTEXT_LENGTH
              value: "2048"
          volumeMounts:
            - name: models
              mountPath: /models
          resources:
            requests:
              memory: "2Gi"
              cpu: "2"
            limits:
              memory: "4Gi"
              cpu: "4"
          livenessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/tags
              port: 11434
            initialDelaySeconds: 10
            periodSeconds: 10

      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: ollama-models
