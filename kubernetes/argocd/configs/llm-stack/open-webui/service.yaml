apiVersion: v1
kind: Service
metadata:
  name: open-webui
  namespace: llm-stack
  labels:
    app: open-webui
  annotations:
    metallb.universe.tf/address-pool: homelab-pool
spec:
  selector:
    app: open-webui
  ports:
    - name: http
      port: 80
      targetPort: 8080
  type: LoadBalancer
