apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-demo
  namespace: argocd
spec:
  project: default
  destination:
    server: https://kubernetes.default.svc
    namespace: otel-demo

  sources:
    - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
      chart: opentelemetry-demo
      targetRevision: 0.40.9
      helm:
        releaseName: otel-demo
        values: |
          # Send all telemetry straight to the existing otelcol-agent collector
          # instead of the chart's bundled one (avoids duplicate host/cluster
          # metrics collection and a second hop).
          default:
            envOverrides:
              - name: OTEL_COLLECTOR_NAME
                value: otelcol-agent-opentelemetry-collector.otelcol.svc.cluster.local
              - name: K6_BROWSER_ENABLED
                value: "true"
              - name: K6_OTEL_EXPORTER_PROTOCOL
                value: grpc
              - name: K6_OTEL_GRPC_EXPORTER_ENDPOINT
                value: otelcol-agent-opentelemetry-collector.otelcol.svc.cluster.local:4317
              - name: K6_BROWSER_EXECUTABLE_PATH
                value: /usr/bin/chromium

          # Disabled: telemetry already lands in the homelab's Grafana/Loki/Tempo/
          # Prometheus stack via otelcol-agent, so these bundled backends are redundant.
          opentelemetry-collector:
            enabled: false
          jaeger:
            enabled: false
          prometheus:
            enabled: false
          grafana:
            enabled: false
          opensearch:
            enabled: false

          # Replace the Locust image with the custom k6 build from the fork.
          # Drop memory from chart default 1500Mi to 512Mi — k6 needs far less
          # than Locust, and the lower limit lets rolling updates fit on one node.
          components:
            load-generator:
              imageOverride:
                repository: ghcr.io/mwimpelberg28/opentelemetry-demo
                tag: load-generator
                pullPolicy: Always
              resources:
                limits:
                  memory: 512Mi
    - repoURL: https://github.com/mwimpelberg28/homelab.git
      targetRevision: main
      path: kubernetes/argocd/configs/otel-demo-lb

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
