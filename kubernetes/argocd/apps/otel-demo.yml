apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: otel-demo
  namespace: argocd
spec:
  project: default
  sources:
  - repoURL: https://open-telemetry.github.io/opentelemetry-helm-charts
    chart: opentelemetry-demo
    targetRevision: 0.40.9
    helm:
      releaseName: otel-demo
      valueFiles:
      - $values/kubernetes/argocd/configs/otel-demo/values.yaml
  - repoURL: https://github.com/mwimpelberg28/homelab.git
    targetRevision: main
    ref: values
  - repoURL: https://github.com/mwimpelberg28/homelab.git
    targetRevision: main
    path: kubernetes/argocd/configs/otel-demo-lb
  destination:
    server: https://kubernetes.default.svc
    namespace: otel-demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
